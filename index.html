<!DOCTYPE html>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Te Amo — AR</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #fff; }
    #splash {
      position: fixed; inset: 0; z-index: 999;
      background: #fff;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 24px;
      transition: opacity 0.6s;
      overflow: hidden;
    }
    #halftone-canvas { position: absolute; inset: 0; pointer-events: none; }
    .splash-content {
      position: relative; z-index: 2;
      display: flex; flex-direction: column;
      align-items: center; gap: 24px;
    }
    #main-title {
      font-family: 'Arial Black', 'Impact', sans-serif;
      font-size: clamp(4rem, 18vw, 7rem);
      font-weight: 900; color: #000;
      letter-spacing: 10px; text-transform: uppercase; line-height: 1;
    }
    #splash-sub {
      font-family: Arial, sans-serif; font-size: 0.85rem; color: #333;
      text-align: center; padding: 0 2rem; max-width: 300px; line-height: 1.5;
    }
    #splash button {
      padding: 14px 40px; background: #1a6fff;
      border: 4px solid #000; color: #fff;
      font-family: 'Arial Black', sans-serif;
      font-size: 1.1rem; letter-spacing: 3px;
      text-transform: uppercase; cursor: pointer;
      box-shadow: 5px 5px 0 #000;
    }
    #hint {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      z-index: 100; background: #fff; border: 3px solid #000; color: #000;
      padding: 10px 22px; font-family: 'Arial Black', sans-serif;
      font-size: 0.85rem; letter-spacing: 2px;
      box-shadow: 4px 4px 0 #000; pointer-events: none;
      display: none; white-space: nowrap;
    }
  </style>
</head>

  document.addEventListener('DOMContentLoaded', () => {
    const blob = new Blob([pattContent], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const marker = document.getElementById('marker');
    marker.setAttribute('patternUrl', url);

    marker.addEventListener('markerFound', () => { document.getElementById('hint').style.display = 'none'; });
    marker.addEventListener('markerLost',  () => { document.getElementById('hint').style.display = 'block'; });
  });

  // Halftone canvas animado
  const canvas = document.getElementById('halftone-canvas');
  const ctx = canvas.getContext('2d');
  let dots = [], W, H;
  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    dots = [];
    const spacing = 30;
    for (let x = 0; x < W + spacing; x += spacing) {
      for (let y = 0; y < H + spacing; y += spacing) {
        const baseR = 2 + Math.random() * 10;
        dots.push({
          x: x + (Math.random()-.5)*8, y: y + (Math.random()-.5)*8,
          baseR, phase: Math.random()*Math.PI*2,
          speed: 0.3+Math.random()*0.7,
          color: ['#1a6fff','#2266ee','#3377ff','#4488ff','#5599ff','#aaccff'][Math.floor(Math.random()*6)],
          alpha: 0.25+Math.random()*0.55
        });
      }
    }
  }
  let t = 0;
  function draw() {
    ctx.clearRect(0,0,W,H); t += 0.01;
    for (const d of dots) {
      const pulse = Math.sin(t*d.speed+d.phase);
      const r = Math.max(0, d.baseR + pulse*d.baseR*0.45);
      ctx.globalAlpha = d.alpha + pulse*0.12;
      ctx.fillStyle = d.color;
      ctx.beginPath(); ctx.arc(d.x, d.y, r, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize', resize);
  resize(); draw();

  function startAR() {
    const splash = document.getElementById('splash');
    splash.style.opacity = '0';
    setTimeout(() => {
      splash.style.display = 'none';
      document.getElementById('arScene').style.display = 'block';
      document.getElementById('hint').style.display = 'block';
    }, 600);
  }
