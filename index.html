<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Te Amo — AR</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #fff; }

    #splash {
      position: fixed; inset: 0; z-index: 999;
      background: #fff;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 24px;
      transition: opacity 0.6s;
      overflow: hidden;
    }

    #halftone-canvas {
      position: absolute; inset: 0;
      pointer-events: none;
    }

    .splash-content {
      position: relative; z-index: 2;
      display: flex; flex-direction: column;
      align-items: center; gap: 24px;
    }

    #main-title {
      font-family: 'Arial Black', 'Impact', sans-serif;
      font-size: clamp(4rem, 18vw, 7rem);
      font-weight: 900;
      color: #000;
      letter-spacing: 10px;
      text-transform: uppercase;
      line-height: 1;
    }

    #splash-sub {
      font-family: Arial, sans-serif;
      font-size: 0.85rem;
      color: #333;
      text-align: center;
      padding: 0 2rem;
      max-width: 300px;
      line-height: 1.5;
    }

    #splash button {
      padding: 14px 40px;
      background: #1a6fff;
      border: 4px solid #000;
      color: #fff;
      font-family: 'Arial Black', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 5px 5px 0 #000;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    #splash button:active {
      transform: translate(3px,3px);
      box-shadow: 2px 2px 0 #000;
    }

    #hint {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      z-index: 100;
      background: #fff;
      border: 3px solid #000;
      color: #000;
      padding: 10px 22px;
      font-family: 'Arial Black', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 2px;
      box-shadow: 4px 4px 0 #000;
      pointer-events: none;
      display: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>

<div id="splash">
  <canvas id="halftone-canvas"></canvas>
  <div class="splash-content">
    <div id="main-title">TE AMO</div>
    <div id="splash-sub">Apunta tu cámara al marcador Hiro para ver el mensaje en realidad aumentada</div>
    <button onclick="startAR()">ABRIR CÁMARA</button>
  </div>
</div>

<div id="hint">APUNTA AL MARCADOR ▼</div>

<a-scene
  id="arScene"
  style="display:none"
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
  renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true;"
  vr-mode-ui="enabled: false">

  <a-marker preset="hiro" id="marker">

    <!-- Puntos halftone azules en el plano, sin fondo -->
    <!-- fila z=-1.2 -->
    <a-sphere position="-1.8 0.06 -1.2" radius="0.06" color="#1a6fff" opacity="0.55" segments-height="8" segments-width="8"></a-sphere>
    <a-sphere position="-1.2 0.06 -1.2" radius="0.10" color="#2266ee" opacity="0.70" segments-height="8" segments-width="8"></a-sphere>
    <a-sphere position="-0.6 0.06 -1.2" radius="0.05" color="#4488ff" opacity="0.50" segments-height="8" segments-width="8"></a-sphere>
    <a-sphere position=" 0.0 0.06 -1.2" radius="0.12" color="#1a6fff" opacity="0.80" segments-height="8" segments-width="8"></a-sphere>
    <a-sphere position=" 0.6 0.06 -1.2" radius="0.07" color="#3377ff" opacity="0.60" segments-height="8" segments-width="8"></a-sphere>
    <a-sphere position=" 1.2 0.06 -1.2" radius="0.09" color="#2266ee" opacity="0.70" segments-height="8" segments-width="8"></a-sphere>
    <a-sphere position=" 1.8 0.06 -1.2" radius="0.05" color="#4488ff" opacity="0.50" segments-height="8" segments-width="8"></a-sphere>
    <!-- fila z=-0.6 -->
    <a-sphere position="-1.5 0.06 -0.6" radius="0.11" color="#1a6fff" opacity="0.75" segments-height="8" segments-width="8"></a-sphere>
    <a-sphere position="-0.9 0.06 -0.6" radius="0.06" color="#4488ff" opacity="0.55" segments-height="8" segments-width="8"></a-sphere>
    <a-sphere position="-0.3 0.06 -0.6" radius="0.09" color="#2266ee" opacity="0.65" segments-height="8" segments-width="8"></a-sphere>
    <a-sphere position=" 0.3 0.06 -0.6" radius="0.05" color="#5599ff" opacity="0.50" segments-height="8" segments-width="8"></a-sphere>
    <a-sphere position=" 0.9 0.06 -0.6" radius="0.12" color="#1a6fff" opacity="0.80" segments-height="8" segments-width="8"></a-sphere>
    <a-sphere position=" 1.5 0.06 -0.6" radius="0.07" color="#3377ff" opacity="0.60" segments-height="8" segments-width="8"></a-sphere>
    <!-- fila z=0.0 -->
    <a-sphere position="-1.8 0.06  0.0" radius="0.08" color="#3377ff" opacity="0.65" segments-height="8" segments-width="8"></a-sphere>
    <a-sphere position="-1.2 0.06  0.0" radius="0.05" color="#5599ff" opacity="0.50" segments-height="8" segments-width="8"></a-sphere>
    <a-sphere position="-0.6 0.06  0.0" radius="0.11" color="#1a6fff" opacity="0.80" segments-height="8" segments-width="8"></a-sphere>
    <a-sphere position=" 0.0 0.06  0.0" radius="0.07" color="#4488ff" opacity="0.60" segments-height="8" segments-width="8"></a-sphere>
    <a-sphere position=" 0.6 0.06  0.0" radius="0.09" color="#2266ee" opacity="0.70" segments-height="8" segments-width="8"></a-sphere>
    <a-sphere position=" 1.2 0.06  0.0" radius="0.05" color="#4488ff" opacity="0.55" segments-height="8" segments-width="8"></a-sphere>
    <a-sphere position=" 1.8 0.06  0.0" radius="0.12" color="#1a6fff" opacity="0.80" segments-height="8" segments-width="8"></a-sphere>
    <!-- fila z=0.6 -->
    <a-sphere position="-1.5 0.06  0.6" radius="0.09" color="#2266ee" opacity="0.70" segments-height="8" segments-width="8"></a-sphere>
    <a-sphere position="-0.9 0.06  0.6" radius="0.11" color="#1a6fff" opacity="0.80" segments-height="8" segments-width="8"></a-sphere>
    <a-sphere position="-0.3 0.06  0.6" radius="0.06" color="#3377ff" opacity="0.55" segments-height="8" segments-width="8"></a-sphere>
    <a-sphere position=" 0.3 0.06  0.6" radius="0.10" color="#2266ee" opacity="0.75" segments-height="8" segments-width="8"></a-sphere>
    <a-sphere position=" 0.9 0.06  0.6" radius="0.05" color="#5599ff" opacity="0.50" segments-height="8" segments-width="8"></a-sphere>
    <a-sphere position=" 1.5 0.06  0.6" radius="0.12" color="#1a6fff" opacity="0.85" segments-height="8" segments-width="8"></a-sphere>
    <!-- fila z=1.2 -->
    <a-sphere position="-1.8 0.06  1.2" radius="0.05" color="#4488ff" opacity="0.50" segments-height="8" segments-width="8"></a-sphere>
    <a-sphere position="-1.2 0.06  1.2" radius="0.10" color="#1a6fff" opacity="0.75" segments-height="8" segments-width="8"></a-sphere>
    <a-sphere position="-0.6 0.06  1.2" radius="0.07" color="#3377ff" opacity="0.60" segments-height="8" segments-width="8"></a-sphere>
    <a-sphere position=" 0.0 0.06  1.2" radius="0.09" color="#2266ee" opacity="0.70" segments-height="8" segments-width="8"></a-sphere>
    <a-sphere position=" 0.6 0.06  1.2" radius="0.06" color="#5599ff" opacity="0.55" segments-height="8" segments-width="8"></a-sphere>
    <a-sphere position=" 1.2 0.06  1.2" radius="0.11" color="#1a6fff" opacity="0.80" segments-height="8" segments-width="8"></a-sphere>
    <a-sphere position=" 1.8 0.06  1.2" radius="0.08" color="#4488ff" opacity="0.65" segments-height="8" segments-width="8"></a-sphere>

    <!-- Círculos azules GRANDES flotantes -->
    <a-sphere position="-1.7 0.5  0.9" radius="0.32" color="#1a6fff" opacity="0.88"
      animation="property: position; to: -1.7 1.2 0.9; dur: 2000; dir: alternate; loop: true; easing: easeInOutSine">
    </a-sphere>
    <a-sphere position=" 1.6 0.4  0.6" radius="0.40" color="#2266ee" opacity="0.92"
      animation="property: position; to: 1.6 1.3 0.6; dur: 1600; dir: alternate; loop: true; easing: easeInOutSine">
    </a-sphere>
    <a-sphere position=" 0.2 0.6 -1.0" radius="0.24" color="#3377ff" opacity="0.82"
      animation="property: position; to: 0.2 1.4 -1.0; dur: 1800; dir: alternate; loop: true; easing: easeInOutSine">
    </a-sphere>
    <a-sphere position="-0.6 0.3  1.4" radius="0.34" color="#1a6fff" opacity="0.88"
      animation="property: position; to: -0.6 1.1 1.4; dur: 2200; dir: alternate; loop: true; easing: easeInOutSine">
    </a-sphere>
    <a-sphere position=" 1.8 0.5 -0.8" radius="0.44" color="#1a6fff" opacity="0.90"
      animation="property: position; to: 1.8 1.5 -0.8; dur: 1400; dir: alternate; loop: true; easing: easeInOutSine">
    </a-sphere>
    <a-sphere position="-1.4 0.4 -0.6" radius="0.28" color="#4488ff" opacity="0.85"
      animation="property: position; to: -1.4 1.2 -0.6; dur: 1900; dir: alternate; loop: true; easing: easeInOutSine">
    </a-sphere>
    <a-sphere position=" 0.8 0.3  1.2" radius="0.20" color="#2266ee" opacity="0.80"
      animation="property: position; to: 0.8 1.0 1.2; dur: 2400; dir: alternate; loop: true; easing: easeInOutSine">
    </a-sphere>

    <!-- Texto TE AMO negro bold, flotando -->
    <a-text value="TE AMO"
      align="center"
      position="0 1.3 0"
      color="#000000"
      width="9"
      font="mozillavr"
      letter-spacing="14"
      animation="property: position; from: 0 1.2 0; to: 0 1.5 0; dur: 1800; dir: alternate; loop: true; easing: easeInOutSine">
    </a-text>

  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<script>
  const canvas = document.getElementById('halftone-canvas');
  const ctx = canvas.getContext('2d');
  let dots = [];
  let W, H;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    buildDots();
  }

  function buildDots() {
    dots = [];
    const spacing = 30;
    for (let x = 0; x < W + spacing; x += spacing) {
      for (let y = 0; y < H + spacing; y += spacing) {
        const baseR = 2 + Math.random() * 10;
        dots.push({
          x: x + (Math.random()-0.5)*8,
          y: y + (Math.random()-0.5)*8,
          baseR,
          phase: Math.random() * Math.PI * 2,
          speed: 0.3 + Math.random() * 0.7,
          color: ['#1a6fff','#2266ee','#3377ff','#4488ff','#5599ff','#aaccff'][Math.floor(Math.random()*6)],
          alpha: 0.25 + Math.random() * 0.55
        });
      }
    }
  }

  let t = 0;
  function draw() {
    ctx.clearRect(0, 0, W, H);
    t += 0.01;
    for (const d of dots) {
      const pulse = Math.sin(t * d.speed + d.phase);
      const r = Math.max(0, d.baseR + pulse * d.baseR * 0.45);
      ctx.globalAlpha = d.alpha + pulse * 0.12;
      ctx.fillStyle = d.color;
      ctx.beginPath();
      ctx.arc(d.x, d.y, r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  resize();
  draw();

  function startAR() {
    const splash = document.getElementById('splash');
    splash.style.opacity = '0';
    setTimeout(() => {
      splash.style.display = 'none';
      document.getElementById('arScene').style.display = 'block';
      document.getElementById('hint').style.display = 'block';
    }, 600);
  }

  document.addEventListener('DOMContentLoaded', () => {
    const marker = document.getElementById('marker');
    if (marker) {
      marker.addEventListener('markerFound', () => { document.getElementById('hint').style.display = 'none'; });
      marker.addEventListener('markerLost',  () => { document.getElementById('hint').style.display = 'block'; });
    }
  });
</script>
</body>
</html>
