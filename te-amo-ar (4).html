/ogAM4AAZAAzggACADOP5/+PM4ADgBAzhAAAHPO//5IAIambWF4aW1hwqF4y0BQSDPAAAAAoXnLQFAV1mAAAAClc2NhbGUEpWFuZ2xly0AGcewAAAAAq2Rlc2NyaXB0b3Jz3AAVzuHx8uDOCBgQAM4ABgQAzgADR4DOAC/Py87Hn5+Xzo9/fl7OvfHy8M7vHw4AzoEAAADOQAAEeM4YACAAzgH5evfO5+vfL84egAAAAM0DgM4fr/6+zuAPXsDOEAAAO8773+gAhqZtYXhpbWHCoXjLQFSx0mAAAAChectATjFdgAAAAKVzY2FsZQKlYW5nbGXLP/9TjuAAAACrZGVzY3JpcHRvcnPcABXO4dHigM4IECAAzgAECADOAAMEAM4AH+//ztf/3//Ov/9+fs498/PxzuwQAADOAgAAAM6AAAT8zrgwcADOAfn4987///4uAADNC4DOH4/+Ps4ADx4AzhAAADvO+//gALNtYXhpbWFQb2ludHNDbHVzdGVygahyb290Tm9kZYOwY2VudGVyUG9pbnRJbmRleMCkbGVhZsOscG9pbnRJbmRleGVzkgABs21pbmltYVBvaW50c0NsdXN0ZXKBqHJvb3ROb2Rlg7BjZW50ZXJQb2ludEluZGV4wKRsZWFmw6xwb2ludEluZGV4ZXOZAAECAwQFBgcIpXdpZHRoZKZoZWlnaHRkpXNjYWxlyz+S50ii8qA1";
  const mindBytes = Uint8Array.from(atob(mindB64), c => c.charCodeAt(0));
  const mindBlob = new Blob([mindBytes], { type: 'application/octet-stream' });
  const mindUrl  = URL.createObjectURL(mindBlob);

  document.addEventListener('DOMContentLoaded', () => {
    document.querySelector('a-scene').setAttribute('mindar-image', 
      `autoStart: true; uiLoading: no; uiError: no; uiScanning: no; imageTargetSrc: ${mindUrl}`
    );

    const target = document.querySelector('[mindar-image-target]');
    target.addEventListener('targetFound', () => { document.getElementById('hint').style.display = 'none'; });
    target.addEventListener('targetLost',  () => { document.getElementById('hint').style.display = 'block'; });
  });

  // Halftone canvas
  const canvas = document.getElementById('halftone-canvas');
  const ctx = canvas.getContext('2d');
  let dots = [], W, H;
  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    dots = [];
    const spacing = 30;
    for (let x = 0; x < W + spacing; x += spacing) {
      for (let y = 0; y < H + spacing; y += spacing) {
        const baseR = 2 + Math.random() * 10;
        dots.push({
          x: x+(Math.random()-.5)*8, y: y+(Math.random()-.5)*8,
          baseR, phase: Math.random()*Math.PI*2,
          speed: 0.3+Math.random()*0.7,
          color: ['#1a6fff','#2266ee','#3377ff','#4488ff','#5599ff','#aaccff'][Math.floor(Math.random()*6)],
          alpha: 0.25+Math.random()*0.55
        });
      }
    }
  }
  let t = 0;
  function draw() {
    ctx.clearRect(0,0,W,H); t+=0.01;
    for (const d of dots) {
      const pulse = Math.sin(t*d.speed+d.phase);
      const r = Math.max(0, d.baseR+pulse*d.baseR*0.45);
      ctx.globalAlpha = d.alpha+pulse*0.12;
      ctx.fillStyle = d.color;
      ctx.beginPath(); ctx.arc(d.x,d.y,r,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize', resize);
  resize(); draw();

  function startAR() {
    const splash = document.getElementById('splash');
    splash.style.opacity = '0';
    setTimeout(() => {
      splash.style.display = 'none';
      document.getElementById('arScene').style.display = 'block';
      document.getElementById('hint').style.display = 'block';
    }, 600);
  }
</script>
